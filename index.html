<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Strategic Marketing System | Journey Map</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #e2e8f0;
            line-height: 1.5;
            min-height: 100vh;
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Journey Map Container */
        .journey-map {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 32px 24px;
            margin: 24px 0;
            border: 1px solid rgba(59, 130, 246, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .journey-title {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .journey-subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 32px;
            font-size: 0.9rem;
        }

        /* Delivery Toggle Controls */
        .delivery-controls {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .delivery-btn {
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 40px;
            padding: 10px 24px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #94a3b8;
        }

        .delivery-btn.active {
            background: #3b82f6;
            border-color: #60a5fa;
            color: white;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }

        .delivery-btn[data-speed="fast"]:hover { background: #10b981; border-color: #34d399; color: white; }
        .delivery-btn[data-speed="delayed"]:hover { background: #f59e0b; border-color: #fbbf24; color: white; }
        .delivery-btn[data-speed="none"]:hover { background: #ef4444; border-color: #f87171; color: white; }

        /* Journey Stages - Flex Container */
        .journey-stages {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }

        /* Individual Stage Card */
        .stage-card {
            flex: 1;
            min-width: 180px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 20px;
            padding: 20px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid #334155;
            position: relative;
        }

        /* Satisfaction-based border colors (applied dynamically) */
        .stage-card.delighted { border-color: #10b981; box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
        .stage-card.satisfied { border-color: #f59e0b; }
        .stage-card.dissatisfied { border-color: #ef4444; }

        /* Hover Effects - WeWeb frontend principles */
        .stage-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.5);
            border-color: #60a5fa;
        }

        /* Bounce Animation for Delighted */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .stage-card.delighted .stage-icon { animation: bounce 0.5s ease; }

        /* Pulse Animation for Satisfied */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; transform: scale(0.98); }
        }
        .stage-card.satisfied { animation: pulse 1.5s infinite; }

        /* Shake Animation for Dissatisfied */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
        .stage-card.dissatisfied .stage-icon { animation: shake 0.4s ease; }

        .stage-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }

        .stage-name {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: #38bdf8;
        }

        .satisfaction-badge {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .badge-delighted { background: #10b98120; color: #34d399; border: 1px solid #10b981; }
        .badge-satisfied { background: #f59e0b20; color: #fbbf24; border: 1px solid #f59e0b; }
        .badge-dissatisfied { background: #ef444420; color: #f87171; border: 1px solid #ef4444; }

        .stage-emotion {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .marketing-action {
            font-size: 0.7rem;
            color: #818cf8;
            margin-top: 8px;
            border-top: 1px solid #334155;
            padding-top: 8px;
        }

        /* Expanded Detail Panel */
        .stage-detail {
            display: none;
            margin-top: 16px;
            padding: 12px;
            background: #0f172a;
            border-radius: 12px;
            font-size: 0.75rem;
            text-align: left;
            color: #cbd5e1;
        }

        .stage-card.expanded .stage-detail {
            display: block;
        }

        /* Arrow between stages - only on desktop */
        .arrow {
            font-size: 1.5rem;
            color: #3b82f6;
            align-self: center;
        }

        @media (max-width: 900px) {
            .journey-stages {
                flex-direction: column;
            }
            .arrow {
                display: none;
            }
            .stage-card {
                width: 100%;
            }
        }

        /* Loading & Error States */
        .loading-spinner {
            text-align: center;
            padding: 40px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #334155;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Touchpoint and Tooltip */
        .touchpoint {
            font-size: 0.7rem;
            color: #64748b;
            margin-top: 6px;
        }

        /* Responsive utilities */
        @media (max-width: 600px) {
            .container { padding: 12px; }
            .stage-name { font-size: 0.9rem; }
        }

        /* Hero Section */
        .hero {
            text-align: center;
            margin-bottom: 32px;
        }
        .hero h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

<div class="container">
    <div class="hero">
        <h1>🧠 Strategic Marketing Intelligence System</h1>
        <p style="color: #94a3b8;">Powered by DeepSeek | Real-time Journey Visualization</p>
    </div>

    <!-- Delivery Simulation Controls -->
    <div class="delivery-controls">
        <button class="delivery-btn active" data-speed="fast" onclick="setDeliverySpeed('fast')">⚡ Fast Delivery (Delighted)</button>
        <button class="delivery-btn" data-speed="delayed" onclick="setDeliverySpeed('delayed')">🕒 Minor Delay (Satisfied)</button>
        <button class="delivery-btn" data-speed="none" onclick="setDeliverySpeed('none')">❌ No Delivery / Service Failure (Dissatisfied)</button>
    </div>

    <!-- Journey Map Container -->
    <div class="journey-map">
        <h2 class="journey-title">Customer Journey Map</h2>
        <p class="journey-subtitle">5-Stage Experience Visualization | Click on any stage for deeper insights</p>
        
        <div id="journeyStages" class="journey-stages">
            <!-- Will be populated dynamically -->
            <div class="loading-spinner"><div class="spinner"></div><p>Loading journey map...</p></div>
        </div>
    </div>

    <div class="feedback-section" style="margin-top: 24px; text-align: center; font-size: 13px; color: #64748b; padding: 16px; border-top: 1px solid #334155;">
        <span>Was this helpful? </span>
        <a href="#" onclick="sendFeedback('yes')" style="color: #10b981;">👍 Yes</a>
        <a href="#" onclick="sendFeedback('no')" style="color: #ef4444;">👎 No</a>
    </div>
</div>

<script>
    // API Configuration
    const API_BASE_URL = "https://Bisratprompt-marketing-system-api.hf.space";
    let currentDeliverySpeed = "fast"; // fast, delayed, none
    let journeyData = null;
    let currentPlanHTML = "";

    // Stage definitions
    const stages = [
        { name: "AWARENESS", icon: "👁️", defaultEmotion: "Curious", defaultTouchpoint: "Social Media Ad", defaultAction: "Educational Content" },
        { name: "CONSIDERATION", icon: "🤔", defaultEmotion: "Skeptical", defaultTouchpoint: "Comparison Site", defaultAction: "Case Studies" },
        { name: "PURCHASE", icon: "💰", defaultEmotion: "Hesitant", defaultTouchpoint: "Pricing Page", defaultAction: "Risk Reversal" },
        { name: "RETENTION", icon: "❤️", defaultEmotion: "Relieved", defaultTouchpoint: "Onboarding Email", defaultAction: "Loyalty Program" },
        { name: "ADVOCACY", icon: "📢", defaultEmotion: "Proud", defaultTouchpoint: "Referral Link", defaultAction: "Referral Rewards" }
    ];

    // Satisfaction mapping based on delivery speed
    function getSatisfactionStatus(speed, stageName) {
        if (speed === "fast") return { status: "Delighted", badge: "badge-delighted", class: "delighted", emotion: "Excited → Thrilled" };
        if (speed === "delayed") return { status: "Satisfied", badge: "badge-satisfied", class: "satisfied", emotion: "Accepting → Patient" };
        return { status: "Dissatisfied", badge: "badge-dissatisfied", class: "dissatisfied", emotion: "Frustrated → Angry" };
    }

    // Render journey map
    function renderJourneyMap() {
        const container = document.getElementById('journeyStages');
        if (!container) return;

        let html = '';
        stages.forEach((stage, index) => {
            const satisfaction = getSatisfactionStatus(currentDeliverySpeed, stage.name);
            const isLast = index === stages.length - 1;
            
            html += `
                <div class="stage-card ${satisfaction.class}" onclick="toggleDetail(this)">
                    <div class="stage-icon">${stage.icon}</div>
                    <div class="stage-name">${stage.name}</div>
                    <div class="satisfaction-badge ${satisfaction.badge}">${satisfaction.status}</div>
                    <div class="stage-emotion">😊 ${satisfaction.emotion}</div>
                    <div class="touchpoint">📍 ${stage.defaultTouchpoint}</div>
                    <div class="marketing-action">${stage.defaultAction}</div>
                    <div class="stage-detail">
                        <strong>🔍 Covetousness Principle:</strong><br>
                        ${getCovetousnessForStage(stage.name, currentDeliverySpeed)}
                        <br><br>
                        <strong>📈 Marketing Implication:</strong><br>
                        Based on ${satisfaction.status.toLowerCase()} status, ${getMarketingImplication(stage.name, currentDeliverySpeed)}
                    </div>
                </div>
                ${!isLast ? '<div class="arrow">➡</div>' : ''}
            `;
        });
        
        container.innerHTML = html;
    }

    // Get Covetousness principle based on stage and delivery speed
    function getCovetousnessForStage(stage, speed) {
        const principles = {
            AWARENESS: { fast: "Induction — imply scarcity and early access", delayed: "Withdraw — create anticipation despite delay", none: "Failed induction — trust broken" },
            CONSIDERATION: { fast: "Rivalries — show social proof and rankings", delayed: "Withdraw — limited spots remain", none: "No rivalry — customers leave" },
            PURCHASE: { fast: "Withdraw — 'Only 5 spots left'", delayed: "Withdraw softened — extend offer", none: "Abandonment — no withdrawal" },
            RETENTION: { fast: "Induction — exclusive tier access", delayed: "Induction weakened — offer apology discount", none: "Churn — customer leaves" },
            ADVOCACY: { fast: "Rivalries — referral leaderboard", delayed: "Reduced rivalry — lower incentive", none: "Negative advocacy — bad reviews" }
        };
        return principles[stage]?.[speed] || "Strategic withdrawal applied";
    }

    function getMarketingImplication(stage, speed) {
        const implications = {
            AWARENESS: { fast: "accelerate ad spend, highlight speed", delayed: "manage expectations, offer tracking", none: "damage control, public apology" },
            CONSIDERATION: { fast: "emphasize quick delivery in comparisons", delayed: "offer discounts for patience", none: "redirect to competitor analysis" },
            PURCHASE: { fast: "upsell premium delivery options", delayed: "offer partial refund or credit", none: "process refunds, recover trust" },
            RETENTION: { fast: "increase loyalty rewards", delayed: "send apology gift", none: "retention campaign, win-back offer" },
            ADVOCACY: { fast: "boost referral rewards", delayed: "offer delayed referral bonus", none: "crisis management, review response" }
        };
        return implications[stage]?.[speed] || "adjust marketing strategy based on satisfaction level";
    }

    function toggleDetail(element) {
        element.classList.toggle('expanded');
    }

    function setDeliverySpeed(speed) {
        currentDeliverySpeed = speed;
        // Update active button styling
        document.querySelectorAll('.delivery-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.getAttribute('data-speed') === speed) btn.classList.add('active');
        });
        renderJourneyMap();
    }

    // API Calls
    async function generatePlan() {
        const customer = document.getElementById('customerInput')?.value || "B2B enterprises in Addis Ababa, age 30-45, income 260K-550K ETB";
        const product = document.getElementById('productInput')?.value || "Premium branding, marketing, website development, and ERP/CRM solutions";
        
        const outputDiv = document.getElementById('output');
        const generateBtn = document.getElementById('generateBtn');
        
        if (generateBtn) {
            generateBtn.disabled = true;
            generateBtn.textContent = "⏳ Generating...";
        }
        
        try {
            const response = await fetch(`${API_BASE_URL}/generate`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ customer_data: customer, product_description: product })
            });
            const data = await response.json();
            if (data.error) throw new Error(data.error);
            
            // Extract journey data if present
            const journeyMatch = data.plan.match(/\[CUSTOMER JOURNEY OUTPUT\]([\s\S]*?)(?=\[|$)/i);
            if (journeyMatch) {
                // Optionally parse additional journey data from API
                console.log("Journey data received from API");
            }
            
            if (outputDiv) outputDiv.innerHTML = markdownToHtml(data.plan);
            currentPlanHTML = data.plan;
            
        } catch (error) {
            console.error("Generation error:", error);
        } finally {
            if (generateBtn) {
                generateBtn.disabled = false;
                generateBtn.textContent = "🚀 Generate Strategy";
            }
        }
    }

    function markdownToHtml(text) {
        if (!text) return '';
        // Simple markdown to HTML conversion
        let html = text.replace(/\n/g, '<br>');
        html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/^### (.*$)/gm, '<h3>$1</h3>');
        html = html.replace(/^## (.*$)/gm, '<h2>$1</h2>');
        return html;
    }

    async function sendFeedback(vote) {
        alert(`Thank you for your ${vote === 'yes' ? 'positive' : 'honest'} feedback! 🙏`);
    }

    // Initialize on load
    document.addEventListener('DOMContentLoaded', () => {
        renderJourneyMap();
        
        // Add input fields if not present
        const inputArea = document.querySelector('.journey-map');
        if (inputArea && !document.getElementById('customerInput')) {
            const controlsDiv = document.createElement('div');
            controlsDiv.style.marginTop = '24px';
            controlsDiv.innerHTML = `
                <label style="display: block; margin-top: 16px; font-weight: 600;">📊 Customer Data:</label>
                <textarea id="customerInput" rows="3" style="width: 100%; background: #0f172a; color: white; border: 1px solid #334155; border-radius: 8px; padding: 12px;">B2B enterprises in Addis Ababa, age 30-45, income 260K-550K ETB, value premium branding and operational efficiency</textarea>
                <label style="display: block; margin-top: 12px; font-weight: 600;">📦 Product Description:</label>
                <textarea id="productInput" rows="3" style="width: 100%; background: #0f172a; color: white; border: 1px solid #334155; border-radius: 8px; padding: 12px;">Premium branding, marketing, website development, and ERP/CRM solutions for enterprise clients</textarea>
                <button id="generateBtn" style="margin-top: 16px; background: #3b82f6; padding: 10px 24px; border-radius: 12px; border: none; color: white; cursor: pointer;">🚀 Generate Strategy</button>
                <div id="output" style="margin-top: 20px; background: #0f172a; padding: 16px; border-radius: 12px; max-height: 400px; overflow-y: auto;"></div>
            `;
            inputArea.parentNode.insertBefore(controlsDiv, inputArea.nextSibling);
            document.getElementById('generateBtn')?.addEventListener('click', generatePlan);
        }
    });
</script>
</body>
</html>
