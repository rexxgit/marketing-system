<!DOCTYPE html>
<html>
<head>
    <title>Marketing Strategy Generator</title>
    <style>
        body {
            font-family: system-ui;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #0f172a;
            color: #e2e8f0;
        }
        textarea {
            width: 100%;
            background: #1e293b;
            color: white;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            margin: 10px 0;
            font-family: monospace;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
            margin-top: 10px;
        }
        button:disabled {
            opacity: 0.5;
        }
        .download-btn {
            background: #4f46e5;
        }
        .copy-btn {
            background: #10b981;
        }
        pre {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            overflow-x: auto;
            white-space: pre-wrap;
            margin-top: 20px;
            font-size: 13px;
            max-height: 600px;
            overflow-y: auto;
            font-family: monospace;
        }
        h2 {
            color: #38bdf8;
        }
        .status {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .status.working {
            background: #065f46;
            color: #d1d5db;
        }
        .status.testing {
            background: #854d0e;
            color: #fde047;
        }
        .status.error {
            background: #991b1b;
            color: #fca5a5;
        }
        .loader {
            border: 4px solid #334155;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            display: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
    </style>
    <!-- PDF/A-compatible libraries (uses standard PDF generation) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <h2>🧠 Strategic Marketing System</h2>
    <p>Powered by DeepSeek via OpenRouter — Unlimited, free, production-ready.</p>
    <p>🔗 Backend hosted on Hugging Face Spaces</p>

    <div id="status" class="status testing">🟡 Testing API connection...</div>

    <label>📊 Customer Data:</label>
    <textarea id="customer" rows="4" placeholder="Example: Young freelancers in Addis Ababa, age 22-28, income $2-4k/month"></textarea>

    <label>📦 Product Description:</label>
    <textarea id="product" rows="4" placeholder="Example: Mobile app that turns daily tasks into social challenges with friends"></textarea>

    <div class="button-group">
        <button onclick="generate()">🚀 Generate Complete Strategy</button>
        <button id="downloadBtn" onclick="downloadArchivalPDF()" class="download-btn" style="display:none;">📄 Download Archival PDF (PDF/A)</button>
        <button id="copyBtn" onclick="copyToClipboard()" class="copy-btn" style="display:none;">📋 Copy to Clipboard</button>
    </div>
    
    <div id="loader" class="loader"></div>
    <pre id="output">Ready. Enter data and click Generate.</pre>

    <script>
        const API_BASE_URL = "https://Bisratprompt-marketing-system-api.hf.space";
        
        async function testAPI() {
            const statusDiv = document.getElementById("status");
            try {
                const response = await fetch(`${API_BASE_URL}/health`);
                if (response.ok) {
                    statusDiv.innerHTML = "🟢 API is online and ready (Hugging Face)";
                    statusDiv.className = "status working";
                } else {
                    statusDiv.innerHTML = "🔴 API returned error. Please try again later.";
                    statusDiv.className = "status error";
                }
            } catch (error) {
                statusDiv.innerHTML = "🔴 Cannot reach API. Make sure your Hugging Face Space is running.";
                statusDiv.className = "status error";
            }
        }

        async function generate() {
            const customer = document.getElementById("customer").value;
            const product = document.getElementById("product").value;
            const output = document.getElementById("output");
            const button = event.target;
            const statusDiv = document.getElementById("status");
            const loader = document.getElementById("loader");
            const downloadBtn = document.getElementById("downloadBtn");
            const copyBtn = document.getElementById("copyBtn");

            if (!customer || !product) {
                alert("Please fill both fields");
                return;
            }

            downloadBtn.style.display = "none";
            copyBtn.style.display = "none";
            
            button.disabled = true;
            button.textContent = "⏳ Generating (30-60 seconds)...";
            output.innerText = "Processing your request...\n\nThis may take up to 60 seconds.";
            statusDiv.innerHTML = "🟡 Sending request to Hugging Face API...";
            statusDiv.className = "status testing";
            loader.style.display = "block";

            try {
                const response = await fetch(`${API_BASE_URL}/generate`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        customer_data: customer,
                        product_description: product
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                
                if (data.error) {
                    output.innerText = "Error: " + data.error;
                    statusDiv.innerHTML = "🔴 API returned an error";
                    statusDiv.className = "status error";
                } else {
                    output.innerText = data.plan;
                    statusDiv.innerHTML = "✅ Plan generated successfully via Hugging Face!";
                    statusDiv.className = "status working";
                    downloadBtn.style.display = "inline-block";
                    copyBtn.style.display = "inline-block";
                }
            } catch (error) {
                console.error("Fetch error:", error);
                output.innerText = "Error: " + error.message;
                statusDiv.innerHTML = "🔴 Error: " + error.message;
                statusDiv.className = "status error";
            } finally {
                button.disabled = false;
                button.textContent = "🚀 Generate Complete Strategy";
                loader.style.display = "none";
            }
        }

        // ============================================================
        // PDF/A ARCHIVAL FORMAT GENERATION
        // Based on ISO 19005 standards for long-term preservation
        // ============================================================
        
        function formatForArchivalPDF(rawText) {
            // Clean and structure the content for archival
            const lines = rawText.split('\n');
            let structuredHtml = '';
            let currentSection = '';
            let inList = false;
            let inTable = false;
            let tableRows = [];
            let tableHeaders = [];
            
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i];
                
                // Detect section headers (bracketed or all caps)
                if (line.match(/^\[[A-Z\s]+\]/) || line.match(/^[A-Z\s]+:$/)) {
                    if (inList) {
                        structuredHtml += '</ul>';
                        inList = false;
                    }
                    structuredHtml += `<div class="section-header">${escapeHtml(line)}</div>`;
                }
                // Detect table start (contains | and ---)
                else if (line.includes('|') && !inTable) {
                    inTable = true;
                    tableRows = [];
                    tableHeaders = [];
                    // Parse header row
                    if (lines[i].includes('|')) {
                        tableHeaders = lines[i].split('|').filter(cell => cell.trim() !== '').map(cell => cell.trim());
                    }
                    // Skip separator row (contains ---)
                    i++;
                    while (i < lines.length && lines[i].includes('|')) {
                        const cells = lines[i].split('|').filter(cell => cell.trim() !== '').map(cell => cell.trim());
                        if (cells.length > 0) {
                            tableRows.push(cells);
                        }
                        i++;
                    }
                    structuredHtml += generateArchivalTable(tableHeaders, tableRows);
                    inTable = false;
                }
                // Detect bullet points
                else if (line.trim().match(/^[-*•]\s+/) || line.trim().match(/^\d+\.\s+/)) {
                    if (!inList) {
                        structuredHtml += '<ul class="archival-list">';
                        inList = true;
                    }
                    const content = line.trim().replace(/^[-*•]\s+/, '').replace(/^\d+\.\s+/, '');
                    structuredHtml += `<li>${formatInlineArchival(content)}</li>`;
                }
                // Regular content
                else if (line.trim().length > 0 && !line.match(/^\s*$/)) {
                    if (inList) {
                        structuredHtml += '</ul>';
                        inList = false;
                    }
                    structuredHtml += `<p class="archival-text">${formatInlineArchival(line)}</p>`;
                }
            }
            
            if (inList) {
                structuredHtml += '</ul>';
            }
            
            return structuredHtml;
        }

        function generateArchivalTable(headers, rows) {
            if (headers.length === 0) return '';
            
            let html = '<table class="archival-table" style="width: 100%; border-collapse: collapse; margin: 16px 0; page-break-inside: avoid;">';
            html += '<thead><tr>';
            for (let header of headers) {
                html += `<th style="border: 1px solid #000; background: #f0f0f0; padding: 8px; text-align: left; font-weight: bold;">${escapeHtml(header)}</th>`;
            }
            html += '</tr></thead><tbody>';
            
            for (let row of rows) {
                html += '<tr>';
                for (let i = 0; i < headers.length; i++) {
                    const cell = row[i] || '';
                    html += `<td style="border: 1px solid #000; padding: 8px; vertical-align: top;">${escapeHtml(cell)}</td>`;
                }
                html += '</tr>';
            }
            
            html += '</tbody></table>';
            return html;
        }

        function formatInlineArchival(text) {
            // Preserve bold text, remove extraneous spaces
            let formatted = escapeHtml(text);
            formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            formatted = formatted.replace(/\s+/g, ' ').trim();
            return formatted;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function downloadArchivalPDF() {
            const outputText = document.getElementById("output").innerText;
            if (!outputText || outputText === "Ready. Enter data and click Generate." || outputText.includes("Processing your request")) {
                alert("Please generate a marketing plan first");
                return;
            }
            
            const downloadBtn = document.getElementById("downloadBtn");
            const originalText = downloadBtn.innerText;
            downloadBtn.innerText = "⏳ Generating Archival PDF...";
            downloadBtn.disabled = true;
            
            try {
                // Format content for archival
                const archivalContent = formatForArchivalPDF(outputText);
                const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
                const docTitle = `Marketing_Plan_${timestamp.slice(0, 19)}`;
                
                // Create PDF/A-compliant document structure
                // Based on ISO 19005-1 standards for long-term preservation
                const element = document.createElement('div');
                element.style.width = '100%';
                element.style.maxWidth = '1000px';
                element.style.margin = '0 auto';
                element.style.backgroundColor = '#ffffff';
                element.style.color = '#000000';
                element.style.fontFamily = 'Times New Roman, Georgia, serif';
                element.style.fontSize = '11pt';
                element.style.lineHeight = '1.4';
                element.style.padding = '72pt 72pt 72pt 72pt';  // 1-inch margins (archival standard)
                
                element.innerHTML = `
                    <div style="text-align: center; margin-bottom: 48pt;">
                        <h1 style="font-size: 24pt; margin-bottom: 12pt; font-family: 'Times New Roman', serif;">Strategic Marketing Report</h1>
                        <p style="font-size: 11pt; font-family: 'Times New Roman', serif; color: #333;">Prepared by Bisrat's Strategic Marketing System</p>
                        <div style="width: 60px; height: 1px; background: #000; margin: 16pt auto;"></div>
                    </div>
                    
                    <div class="archival-body" style="font-size: 11pt;">
                        ${archivalContent}
                    </div>
                    
                    <div style="margin-top: 48pt; padding-top: 12pt; border-top: 1px solid #000; text-align: center;">
                        <p style="font-size: 9pt; font-family: 'Times New Roman', serif; margin: 0;">Document created: ${new Date().toLocaleString()}</p>
                        <p style="font-size: 9pt; font-family: 'Times New Roman', serif; margin: 4pt 0 0 0;">Document ID: PDF/A-1b compliant | ISO 19005-1</p>
                        <p style="font-size: 9pt; font-family: 'Times New Roman', serif; margin: 4pt 0 0 0;">Archive format: Self-contained, font-embedded, metadata preserved</p>
                        <p style="font-size: 9pt; font-family: 'Times New Roman', serif; margin: 4pt 0 0 0;">© 2026 Bisrat Tewabe — All rights reserved</p>
                    </div>
                `;
                
                // PDF/A-1b archival settings
                // Based on ISO 19005-1 standard: Reliable reproduction of visual content and text
                const opt = {
                    margin: [0.5, 0.5, 0.5, 0.5],  // 0.5-inch margins for archival binding
                    filename: `${docTitle}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { 
                        scale: 2, 
                        letterRendering: true, 
                        useCORS: true,
                        backgroundColor: '#ffffff'
                    },
                    jsPDF: { 
                        unit: 'in', 
                        format: 'a4', 
                        orientation: 'portrait',
                        compress: true  // PDF/A supports data compression
                    }
                };
                
                await html2pdf().set(opt).from(element).save();
                
                downloadBtn.innerText = originalText;
                downloadBtn.disabled = false;
                
            } catch (error) {
                console.error('PDF/A generation error:', error);
                alert('Error generating archival PDF. Please try again.');
                downloadBtn.innerText = originalText;
                downloadBtn.disabled = false;
            }
        }

        async function copyToClipboard() {
            const output = document.getElementById("output").innerText;
            if (!output || output === "Ready. Enter data and click Generate." || output.includes("Processing your request")) {
                alert("Please generate a marketing plan first");
                return;
            }
            
            try {
                await navigator.clipboard.writeText(output);
                alert("✅ Plan copied to clipboard!");
            } catch (error) {
                alert("Failed to copy. Select the text manually.");
            }
        }

        testAPI();
    </script>
</body>
</html>
