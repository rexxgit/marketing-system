<!DOCTYPE html>
<html>
<head>
    <title>Marketing Strategy Generator</title>
    <style>
        body {
            font-family: system-ui;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #0f172a;
            color: #e2e8f0;
        }
        textarea {
            width: 100%;
            background: #1e293b;
            color: white;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            margin: 10px 0;
            font-family: monospace;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
            margin-top: 10px;
        }
        button:disabled {
            opacity: 0.5;
        }
        .download-btn {
            background: #4f46e5;
        }
        .copy-btn {
            background: #10b981;
        }
        pre {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            overflow-x: auto;
            white-space: pre-wrap;
            margin-top: 20px;
            font-size: 13px;
            max-height: 600px;
            overflow-y: auto;
            font-family: monospace;
        }
        h2 {
            color: #38bdf8;
        }
        .status {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .status.working {
            background: #065f46;
            color: #d1d5db;
        }
        .status.testing {
            background: #854d0e;
            color: #fde047;
        }
        .status.error {
            background: #991b1b;
            color: #fca5a5;
        }
        .loader {
            border: 4px solid #334155;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            display: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <h2>🧠 Strategic Marketing System</h2>
    <p>Powered by DeepSeek via OpenRouter — Unlimited, free, production-ready.</p>
    <p>🔗 Backend hosted on Hugging Face Spaces</p>

    <div id="status" class="status testing">🟡 Testing API connection...</div>

    <label>📊 Customer Data:</label>
    <textarea id="customer" rows="4" placeholder="Example: Young freelancers in Addis Ababa, age 22-28, income $2-4k/month"></textarea>

    <label>📦 Product Description:</label>
    <textarea id="product" rows="4" placeholder="Example: Mobile app that turns daily tasks into social challenges with friends"></textarea>

    <div class="button-group">
        <button onclick="generate()">🚀 Generate Complete Strategy</button>
        <button id="downloadBtn" onclick="downloadPlan()" class="download-btn" style="display:none;">📄 Download as PDF</button>
        <button id="copyBtn" onclick="copyToClipboard()" class="copy-btn" style="display:none;">📋 Copy to Clipboard</button>
    </div>
    
    <div id="loader" class="loader"></div>
    <pre id="output">Ready. Enter data and click Generate.</pre>

    <script>
        const API_BASE_URL = "https://Bisratprompt-marketing-system-api.hf.space";
        
        async function testAPI() {
            const statusDiv = document.getElementById("status");
            try {
                const response = await fetch(`${API_BASE_URL}/health`);
                if (response.ok) {
                    statusDiv.innerHTML = "🟢 API is online and ready (Hugging Face)";
                    statusDiv.className = "status working";
                } else {
                    statusDiv.innerHTML = "🔴 API returned error. Please try again later.";
                    statusDiv.className = "status error";
                }
            } catch (error) {
                statusDiv.innerHTML = "🔴 Cannot reach API. Make sure your Hugging Face Space is running.";
                statusDiv.className = "status error";
            }
        }

        async function generate() {
            const customer = document.getElementById("customer").value;
            const product = document.getElementById("product").value;
            const output = document.getElementById("output");
            const button = event.target;
            const statusDiv = document.getElementById("status");
            const loader = document.getElementById("loader");
            const downloadBtn = document.getElementById("downloadBtn");
            const copyBtn = document.getElementById("copyBtn");

            if (!customer || !product) {
                alert("Please fill both fields");
                return;
            }

            downloadBtn.style.display = "none";
            copyBtn.style.display = "none";
            
            button.disabled = true;
            button.textContent = "⏳ Generating (30-60 seconds)...";
            output.innerText = "Processing your request...\n\nThis may take up to 60 seconds.";
            statusDiv.innerHTML = "🟡 Sending request to Hugging Face API...";
            statusDiv.className = "status testing";
            loader.style.display = "block";

            try {
                const response = await fetch(`${API_BASE_URL}/generate`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        customer_data: customer,
                        product_description: product
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                
                if (data.error) {
                    output.innerText = "Error: " + data.error;
                    statusDiv.innerHTML = "🔴 API returned an error";
                    statusDiv.className = "status error";
                } else {
                    output.innerText = data.plan;
                    statusDiv.innerHTML = "✅ Plan generated successfully via Hugging Face!";
                    statusDiv.className = "status working";
                    downloadBtn.style.display = "inline-block";
                    copyBtn.style.display = "inline-block";
                }
            } catch (error) {
                console.error("Fetch error:", error);
                output.innerText = "Error: " + error.message;
                statusDiv.innerHTML = "🔴 Error: " + error.message;
                statusDiv.className = "status error";
            } finally {
                button.disabled = false;
                button.textContent = "🚀 Generate Complete Strategy";
                loader.style.display = "none";
            }
        }

        function formatPlanForPDF(rawText) {
            // Convert raw text to structured HTML
            let html = '<div style="font-family: Arial, sans-serif; line-height: 1.6; color: #1e293b;">';
            
            // Split by sections (identified by [SECTION] patterns)
            const sections = rawText.split(/(?=\[.*?\]|^#+)/);
            
            for (let section of sections) {
                section = section.trim();
                if (!section) continue;
                
                // Detect section headers (all caps or bracketed)
                if (section.match(/^\[[A-Z\s]+\]/) || section.match(/^[A-Z\s]+:/)) {
                    html += `<h2 style="color: #1e293b; border-bottom: 2px solid #3b82f6; padding-bottom: 8px; margin-top: 24px; margin-bottom: 16px; font-size: 20px;">${escapeHtml(section.split('\n')[0])}</h2>`;
                    // Add the rest of the section as paragraph
                    const rest = section.split('\n').slice(1).join('\n').trim();
                    if (rest) {
                        html += `<div style="margin-bottom: 16px;">${formatContent(rest)}</div>`;
                    }
                } 
                // Detect tables (markdown style)
                else if (section.includes('|') && section.includes('---')) {
                    html += formatTable(section);
                }
                // Bullet points
                else if (section.includes('\n- ') || section.includes('\n• ') || section.includes('\n* ')) {
                    html += formatBulletList(section);
                }
                // Regular content
                else {
                    html += `<p style="margin-bottom: 12px;">${formatContent(section)}</p>`;
                }
            }
            
            html += '</div>';
            return html;
        }

        function formatContent(text) {
            // Escape HTML
            let escaped = escapeHtml(text);
            // Convert line breaks to <br>
            escaped = escaped.replace(/\n/g, '<br>');
            // Bold **text**
            escaped = escaped.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            return escaped;
        }

        function formatBulletList(text) {
            const lines = text.split('\n');
            let html = '<ul style="margin: 8px 0 8px 20px; list-style-type: disc;">';
            
            for (let line of lines) {
                line = line.trim();
                if (line.match(/^[-*•]\s+(.+)/)) {
                    const content = line.replace(/^[-*•]\s+/, '');
                    html += `<li style="margin-bottom: 6px;">${formatContent(content)}</li>`;
                } else if (line.match(/^\d+\.\s+(.+)/)) {
                    const content = line.replace(/^\d+\.\s+/, '');
                    html += `<li style="margin-bottom: 6px; list-style-type: decimal;">${formatContent(content)}</li>`;
                } else if (line.length > 0 && !line.match(/^[\s|]+$/)) {
                    html += `<li style="margin-bottom: 6px; list-style-type: none; font-style: italic;">${formatContent(line)}</li>`;
                }
            }
            
            html += '</ul>';
            return html;
        }

        function formatTable(text) {
            const lines = text.split('\n');
            let inTable = false;
            let headers = [];
            let rows = [];
            let currentRow = [];
            
            for (let line of lines) {
                if (line.includes('|')) {
                    const cells = line.split('|').filter(cell => cell.trim() !== '').map(cell => cell.trim());
                    
                    if (!inTable && cells.length > 0) {
                        inTable = true;
                        headers = cells;
                    } else if (line.includes('---') && headers.length > 0) {
                        // Separator row - skip
                        continue;
                    } else if (cells.length > 0 && inTable) {
                        rows.push(cells);
                    }
                } else if (inTable && line.trim() === '') {
                    inTable = false;
                }
            }
            
            if (headers.length === 0) return `<p>${formatContent(text)}</p>`;
            
            let html = '<table style="width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 13px;">';
            html += '<thead><tr style="background-color: #f1f5f9;">';
            for (let header of headers) {
                html += `<th style="border: 1px solid #cbd5e1; padding: 10px; text-align: left; font-weight: bold;">${escapeHtml(header)}</th>`;
            }
            html += '</tr></thead><tbody>';
            
            for (let row of rows) {
                html += '<tr>';
                for (let i = 0; i < headers.length; i++) {
                    const cell = row[i] || '';
                    html += `<td style="border: 1px solid #cbd5e1; padding: 8px;">${escapeHtml(cell)}</td>`;
                }
                html += '</tr>';
            }
            
            html += '</tbody></table>';
            return html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML();
        }

        async function downloadPlan() {
            const output = document.getElementById("output").innerText;
            if (!output || output === "Ready. Enter data and click Generate." || output.includes("Processing your request")) {
                alert("Please generate a marketing plan first");
                return;
            }
            
            // Show loading indicator
            const downloadBtn = document.getElementById("downloadBtn");
            const originalText = downloadBtn.innerText;
            downloadBtn.innerText = "⏳ Generating PDF...";
            downloadBtn.disabled = true;
            
            try {
                // Format the plan for PDF
                const formattedContent = formatPlanForPDF(output);
                
                // Create styled PDF document
                const element = document.createElement('div');
                element.style.padding = '40px';
                element.style.fontFamily = 'Arial, sans-serif';
                element.style.maxWidth = '900px';
                element.style.margin = '0 auto';
                element.style.backgroundColor = 'white';
                element.style.color = '#1e293b';
                element.style.lineHeight = '1.5';
                element.innerHTML = `
                    <div style="text-align: center; margin-bottom: 30px;">
                        <h1 style="color: #1e293b; font-size: 28px; margin-bottom: 8px;">📊 Strategic Marketing Report</h1>
                        <p style="color: #64748b; font-size: 14px;">Generated by Bisrat's Strategic Marketing System</p>
                        <div style="width: 60px; height: 3px; background: #3b82f6; margin: 16px auto;"></div>
                    </div>
                    
                    ${formattedContent}
                    
                    <div style="margin-top: 40px; padding-top: 20px; border-top: 2px solid #e2e8f0; text-align: center;">
                        <p style="color: #94a3b8; font-size: 10px; margin: 0;">Generated on: ${new Date().toLocaleString()}</p>
                        <p style="color: #94a3b8; font-size: 10px; margin: 5px 0 0 0;">Powered by DeepSeek via OpenRouter | Hugging Face Spaces</p>
                        <p style="color: #94a3b8; font-size: 10px; margin: 5px 0 0 0;">© 2026 Bisrat Tewabe</p>
                    </div>
                `;
                
                // PDF options for better formatting
                const opt = {
                    margin: [0.5, 0.5, 0.5, 0.5],
                    filename: `marketing_plan_${new Date().toISOString().slice(0, 19).replace(/:/g, '-')}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, letterRendering: true, useCORS: true },
                    jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
                };
                
                await html2pdf().set(opt).from(element).save();
                
                downloadBtn.innerText = originalText;
                downloadBtn.disabled = false;
            } catch (error) {
                console.error('PDF error:', error);
                alert('Error generating PDF. Please try again.');
                downloadBtn.innerText = originalText;
                downloadBtn.disabled = false;
            }
        }

        async function copyToClipboard() {
            const output = document.getElementById("output").innerText;
            if (!output || output === "Ready. Enter data and click Generate." || output.includes("Processing your request")) {
                alert("Please generate a marketing plan first");
                return;
            }
            
            try {
                await navigator.clipboard.writeText(output);
                alert("✅ Plan copied to clipboard!");
            } catch (error) {
                alert("Failed to copy. Select the text manually.");
            }
        }

        testAPI();
    </script>
</body>
</html>
